name: Validate public source

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-public-source-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-public-source:
    name: Validate public source
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout public source
        uses: actions/checkout@v4

      - name: Validate public source hygiene
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = process.cwd();
          const disallowedPublicMarkers = [
            ...[
              'aW5jbHVkZXMvcHJvLQ==',
              'Y2xhc3MtYmJwYS1leHBvcnQtY29udHJvbGxlcg==',
              'Y2xhc3MtYmJwYS1ldmVudHMtc3RhdHMtY29udHJvbGxlcg==',
              'QkJQQV9FeHBvcnRfQ29udHJvbGxlcg==',
              'QkJQQV9FdmVudHNfU3RhdHNfQ29udHJvbGxlcg==',
              'YmJwYV9wcm9jZXNzX2V4cG9ydF9qb2I=',
              'YmJwYV9wdXJnZV9leHBpcmVkX2V4cG9ydF9maWxlcw==',
              'cHJvX2V2ZW50c19jb25maWc=',
              'YmJwYV9yZXNvbHZlX3Byb19ldmVudHNfcnVudGltZV9jb25maWc=',
              'UHJlbWl1bUxvY2tTdGF0ZQ==',
              'ZnJvbnQvcHdhLWluc3RhbGxhYmlsaXR5LnBocA==',
              'ZnJvbnQvcHdhLWFzc2V0LWlzb2xhdGlvbi5waHA=',
              'YXNzZXRzL2ltYWdlcy9wcm8=',
              'YXNzZXRzL2ltYWdlcy9wcmVtaXVtLWxvY2s=',
            ].map((value) => Buffer.from(value, 'base64').toString('utf8')),
          ];

          const skipDirs = new Set(['.git', 'node_modules', 'vendor', 'build', 'dist', 'package-tmp']);
          const hygieneMatches = [];

          function shouldSkip(fullPath, entry) {
            if (entry.isDirectory() && skipDirs.has(entry.name)) {
              return true;
            }
            return false;
          }

          function walk(directory) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const fullPath = path.join(directory, entry.name);
              if (shouldSkip(fullPath, entry)) {
                continue;
              }
              if (entry.isDirectory()) {
                walk(fullPath);
                continue;
              }
              if (!entry.isFile() && !entry.isSymbolicLink()) {
                continue;
              }

              const content = fs.readFileSync(fullPath);
              for (const needle of disallowedPublicMarkers) {
                if (content.includes(Buffer.from(needle))) {
                  hygieneMatches.push(path.relative(root, fullPath));
                  break;
                }
              }
            }
          }

          walk(root);

          if (hygieneMatches.length > 0) {
            console.error('Disallowed public source marker(s) found in:');
            for (const match of hygieneMatches) {
              console.error(`- ${match}`);
            }
            process.exit(1);
          }
          NODE

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install i18n build tools
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y gettext php-cli

          curl -fsSL https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar -o wp-cli.phar
          php wp-cli.phar --info
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

          command -v wp
          command -v msgmerge
          command -v msgfmt
          command -v msgattrib

      - name: Install npm dependencies
        run: npm ci --no-audit --fund=false

      - name: Rebuild public source
        run: npm run build
